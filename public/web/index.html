<!doctype html>
<html lang="en" class="wa-brand-cyan">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Tracks --esphome-primary's fallback below (HTML attr can't read a CSS var). -->
    <meta name="theme-color" content="#009ac7" />
    <!--
      Content-Security-Policy for the standalone ESPHome Web site. Same
      defense-in-depth shape as the dashboard's index.html, with two
      site-specific openers:
        * connect-src adds https://firmware.esphome.io — the adoptable
          "prepare for first use" and Pico install flows fetch the
          esphome-web firmware manifest and binary parts from there. No
          backend WebSocket exists here (this is a static site), so ws:/wss:
          are dropped.
        * img-src keeps 'self' data: https: for the runtime-built MDI icon
          data: URIs and any remote logos.
      script-src falls back to default-src 'self' so injected
      <script src="https://evil.com/..."> can't load; everything the app
      needs (Web Serial, esptool-js, Improv) is bundled same-origin.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; img-src 'self' data: https:; style-src 'self' 'unsafe-inline'; font-src 'self' data:; connect-src 'self' data: https://firmware.esphome.io; object-src 'none'; base-uri 'self'; form-action 'self'"
    />
    <title>ESPHome Web</title>
    <link
      rel="icon"
      type="image/svg+xml"
      href="/static/logo/esphome-favicon.svg"
    />
    <style>
      :root {
        /* App palette — the single place to adjust colors. Each is HA's theme
           var when embedded, else the fallback; everything reads these tokens,
           so editing a value here overrides HA everywhere. */
        --esphome-primary: var(--primary-color, #009ac7);
        --esphome-on-primary: var(--text-primary-color, #ffffff);
        --esphome-success: var(--success-color, #2ecc71);
        --esphome-warning: var(--warning-color, #f39c12);
        --esphome-error: var(--error-color, #e74c3c);
        --esphome-offline: var(--disabled-text-color, #95a5a6);

        /* Bridge the Material Web (MWC) theme vars the Improv Wi-Fi
           provisioning dialog uses onto the ESPHome palette, so that
           SDK-provided (MWC-based) dialog renders on-brand instead of MWC's
           default purple. It's the only MWC surface in this otherwise
           Web Awesome app. */
        --mdc-theme-primary: var(--esphome-primary);
        --mdc-theme-on-primary: var(--esphome-on-primary);
        --mdc-theme-secondary: var(--esphome-primary);
        --mdc-theme-error: var(--esphome-error);
      }
      :root,
      .wa-light,
      .wa-dark .wa-invert {
        --wa-color-brand-fill-loud: var(--esphome-primary);
        --wa-color-brand-on-loud: var(--esphome-on-primary);
        /* A tint of the brand, intentionally tracking --esphome-primary
           rather than HA's --state-active-color (which is amber), so the
           quiet brand fill stays on-brand and follows the single knob. */
        --wa-color-brand-fill-quiet: color-mix(
          in srgb,
          var(--esphome-primary),
          transparent 88%
        );
        --wa-color-brand-on-quiet: var(--esphome-primary);
      }

      body {
        margin: 0;
        padding: 0;
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        background-color: var(--wa-color-surface-default, #f8f9fa);
        color: var(--wa-color-text-normal, #212529);
      }
    </style>
  </head>
  <body>
    <esphome-web-app></esphome-web-app>
  </body>
</html>
