name: Deploy ESPHome Web

# Builds the standalone ESPHome Web site (npm run build:web) and publishes it
# to GitHub Pages (web.esphome.io). This is the backend-free Web Serial tool,
# separate from the wheel the release workflow ships. Enabling the deploy needs
# GitHub Pages configured for this repo (source: GitHub Actions) and the
# web.esphome.io custom domain pointed at Pages.

on:
  push:
    branches: [main]
  workflow_dispatch:

# Build job just reads the repo and uploads the artifact; the deploy job below
# gets the Pages-write + OIDC scope.
permissions:
  contents: read

concurrency:
  group: deploy-web
  # Let an in-progress production deployment finish rather than cancelling it
  # mid-publish (GitHub's Pages starter workflow recommends this).
  cancel-in-progress: false

env:
  NODE_VERSION: "24.x"

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download translations from Lokalise
        # Best-effort: the build works English-only without the secrets (the
        # runtime falls back to English per-key), and non-English locales load
        # lazily. When the secrets are present we ship every translated locale.
        env:
          LOKALISE_API_TOKEN: ${{ secrets.LOKALISE_API_TOKEN }}
          LOKALISE_PROJECT_ID: ${{ secrets.LOKALISE_PROJECT_ID }}
        run: |
          if [ -z "${LOKALISE_API_TOKEN}" ] || [ -z "${LOKALISE_PROJECT_ID}" ]; then
            echo "::warning::Lokalise secrets unset; deploying English-only."
            exit 0
          fi
          npm run translations:download

      - name: Build ESPHome Web
        run: npm run build:web

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: esphome_web

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    # Only publish from the canonical repo's main branch; PRs and forks build
    # (in test.yml / the build job) but never deploy.
    if: github.repository == 'esphome/device-builder-frontend'
    # Only the publishing job needs Pages write + OIDC.
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Configure Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
